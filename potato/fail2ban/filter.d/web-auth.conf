# Match Caddy JSON access log lines for failed/throttled auth attempts.
# Caddy log format includes:
#   "request":{"remote_ip":"1.2.3.4", "uri":"/auth/verify", ...}, "status":401
#
# We trip on:
#   - Any 401 against /auth/verify (bad token submission)
#   - Any 429 against /auth/verify (in-app rate limit hit; means client kept
#     hammering after we already throttled them)
#   - Any 401 against /auth/admin/* (someone probing admin endpoints)

[INCLUDES]
before = common.conf

[Definition]
# fail2ban's <HOST> macro pulls an IP. We anchor on Caddy's "remote_ip" field.
# We keep two regexes — one for verify, one for admin — so the messages in
# fail2ban.log are clearly attributed.
failregex = ^.*"remote_ip":"<HOST>".*"uri":"/auth/verify[^"]*".*"status":(?:401|429).*$
            ^.*"remote_ip":"<HOST>".*"uri":"/auth/admin[^"]*".*"status":(?:401|403).*$

ignoreregex =

# JSON keys can appear in any order, so we don't anchor on field positions.
# datepattern lets fail2ban parse the timestamp out of Caddy's "ts" field
# (RFC3339). If you switch Caddy to "format console", update this.
datepattern = "ts":"%%Y-%%m-%%dT%%H:%%M:%%S
