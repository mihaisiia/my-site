# udr-block: push the offending IP into a UniFi firewall group on the UDR-7,
# so the gateway drops traffic before it ever reaches the potato.
#
# Required env (set on the fail2ban container):
#   UDR_HOST     - LAN host/IP of the Dream Router (e.g. 192.168.1.1)
#   UDR_USER     - service account username (NOT your admin account)
#   UDR_PASS     - service account password
#   UDR_SITE     - UniFi site name, usually "default"
#   UDR_GROUP_ID - _id of the firewall address group used as the deny list
#
# How to set this up on the UDR-7:
#   1. Settings → Admins → Add Admin → role "Limited Admin" with
#      "Site Admin" off but "Network Admin" on (just enough to edit groups).
#   2. Settings → Security → Firewall → Profiles → IP/Port Groups →
#      Create "edge-deny" (Type: IPv4 Address/Subnet). Note its _id.
#   3. Settings → Security → Firewall → Internet (WAN_IN) → Create rule
#      "Drop edge-deny" → Action: Drop, Source: edge-deny group, Dest: Any.
#   4. Drop the credentials + group _id into the .env on the potato.

[Definition]
# Use absolute paths because fail2ban resolves them relative to /.
actionban   = /etc/fail2ban/action.d/udr-block.py ban   <ip>
actionunban = /etc/fail2ban/action.d/udr-block.py unban <ip>
actioncheck =
actionstart =
actionstop  =

[Init]
